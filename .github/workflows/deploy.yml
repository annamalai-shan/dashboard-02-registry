name: Build & Deploy registry to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Regenerate public/r/*.json from registry.json so the deployed
      # output always matches the committed source.
      - name: Build registry
        run: npx --yes shadcn@latest build

      # Build the live demo app and static-export it.
      - name: Build demo app
        working-directory: demo
        run: |
          npm ci
          npm run build

      # Place the exported demo under public/demo so it serves at
      # <pages-root>/demo/ (matching the app's basePath).
      - name: Assemble demo into Pages output
        run: |
          mkdir -p public/demo
          cp -r demo/out/. public/demo/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
